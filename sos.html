<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeShe SOS</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sos-container">

<h1>🚨 Emergency SOS</h1>

<p>
If you are in danger, press the SOS button immediately.
</p>

<button id="sosButton" class="sos-btn">
 
    ACTIVATE SOS
</button>

<button id="cancelBtn" class="normal-btn" style="display:none;">
❌ Cancel SOS
</button>

<br><br>

<button id="locationBtn" class="normal-btn">
📍 Get My Location
</button>

<br><br>

<button onclick="window.open('https://www.google.com/maps/search/police+station')"
class="normal-btn">

👮 Nearby Police

</button>

<br><br>

<button onclick="window.open('https://www.google.com/maps/search/hospital')"
class="normal-btn">

🏥 Nearby Hospital

</button>
<button
id="sendMessageBtn"
class="normal-btn"
style="display:none; background:#25D366; color:white;">

📤 Send Emergency Message

</button>

<br><br>
<div id="location"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>

<script src="js/sos.js"></script>

</body>
</html>
