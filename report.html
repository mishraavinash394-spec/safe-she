<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Incident</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="report-container">

<h1>📝 Report an Incident</h1>

<form id="reportForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="text" id="locationInput" placeholder="Location" required>

<select id="incident">

<option>Harassment</option>

<option>Stalking</option>

<option>Domestic Violence</option>

<option>Robbery</option>

<option>Other</option>

</select>

<textarea id="description"
placeholder="Describe the incident..."
rows="6"></textarea>
<div class="upload-section">

    <label><b>📷 Upload Image</b></label>

    <input type="file"
           id="imageUpload"
           accept="image/*">

    <br><br>

    <img id="imagePreview"
         style="max-width:250px; display:none; border-radius:10px;">

    <br><br>

    <label><b>🎥 Upload Video</b></label>

    <input type="file"
           id="videoUpload"
           accept="video/*">

    <br><br>

    <video id="videoPreview"
           width="300"
           controls
           style="display:none; border-radius:10px;">
    </video>

</div>

<br>
<button type="submit">
Submit Report
</button>

</form>
<hr>

<h2>📋 Report History</h2>

<input
type="text"
id="searchBox"
placeholder="🔍 Search by Name or Incident"
onkeyup="displayReports()"
style="
width:100%;
padding:12px;
margin:15px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
">
<br>

<button
onclick="clearReports()"
style="
background:#d32f2f;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
">
🗑 Clear All Reports
</button>

<div id="reportHistory"></div>
<p id="successMessage"></p>

</div>

<div id="toast">
    ✅ Report Submitted Successfully
</div>

<script src="js/report.js"></script>

</body>
</html>
