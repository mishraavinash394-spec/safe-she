<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emergency Numbers</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
color:#e91e63;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.card h2{
margin:0;
font-size:22px;
}

.call-btn{
background:#e91e63;
color:white;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.call-btn:hover{
background:#c2185b;
}

</style>

</head>

<body>

<div class="container">

<h1>🚨 Emergency Helpline Numbers</h1>

<div class="card">
<h2>🚓 Police - 100</h2>
<a href="tel:100" class="call-btn">Call</a>
</div>

<div class="card">
<h2>🚑 Ambulance - 108</h2>
<a href="tel:108" class="call-btn">Call</a>
</div>

<div class="card">
<h2>🔥 Fire Brigade - 101</h2>
<a href="tel:101" class="call-btn">Call</a>
</div>

<div class="card">
<h2>👩 Women Helpline - 181</h2>
<a href="tel:181" class="call-btn">Call</a>
</div>

<div class="card">
<h2>☎ National Emergency - 112</h2>
<a href="tel:112" class="call-btn">Call</a>
</div>

</div>

</body>
</html>
